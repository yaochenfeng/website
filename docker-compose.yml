version: "3"
services:
  web:
    image: yaochenfeng/website
    volumes:
      - .:/code
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=psql://website:website@db/website
    depends_on:
      - db

  db:
    image: postgres
    volumes:
      - web-db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=website
      - POSTGRES_USER=website
      - POSTGRES_PASSWORD=website
volumes:
  web-data:
  web-db:
