version: "3"
services:
  web:
    image: yaochenfeng/website
    volumes:
      - .:/code
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - DATABASE_URL=psql://website:website@db/website
      - CACHE_URL=redis://:website@redis:6379/1
      - REDIS_URL=redis://:website@redis:6379/1
    depends_on:
      - db
      - redis

  db:
    image: postgres
    restart: always
    volumes:
      - db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=website
      - POSTGRES_USER=website
      - POSTGRES_PASSWORD=website

  redis:
    image: redis
    restart: always
    command: redis-server --save 20 1 --loglevel warning --requirepass website
    volumes:
      - cache:/data
    ports:
      - "6379:6379"

volumes:
  db:
  cache:
